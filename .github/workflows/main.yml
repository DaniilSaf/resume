name: Build Resume PDF

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t resume-builder .

      - name: Compile PDF in container
        run: docker run --name resume_container resume-builder

      - name: Copy PDF from container
        run: docker cp resume_container:/app/CV/main.pdf .

      - name: Verify PDF exists
        run: test -f main.pdf && echo " PDF built successfully!"

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: main.pdf
